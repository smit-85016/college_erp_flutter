name: college_erp
description: College ERP System - JG University
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  shared_preferences: ^2.3.2

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # 🔥 ADD THIS
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# 🔥 CONFIG (keep this at bottom)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"